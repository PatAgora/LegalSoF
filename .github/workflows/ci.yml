name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dev/archived-2026-04-14-app/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: sof_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://ci:ci_password@localhost:5432/sof_platform_test
      SECRET_KEY: ci-only-secret-key-not-for-production
      ENVIRONMENT: testing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dev/archived-2026-04-14-app/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # Unit tests are self-contained; the integration tests use an
        # in-memory SQLite engine, but app config still expects a
        # DATABASE_URL, which the postgres service above provides.
        run: pytest tests -q

  frontend-build:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dev/archived-2026-04-14-app/backend/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dev/archived-2026-04-14-app/backend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build:typecheck
