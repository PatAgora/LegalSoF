services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sof-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sof_platform}
    ports:
      - "5433:5432"
    volumes:
      - sof-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sof-backend-net

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sof-backend
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:?err}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-sof_platform}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - CORS_ORIGINS=["http://localhost","http://localhost:8080","http://127.0.0.1","http://127.0.0.1:8080"]
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
      - sof-backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - sof-backend-net
      - sof-frontend-net

  # React Frontend
  frontend:
    build:
      context: ./backend/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    container_name: sof-frontend
    environment:
      - VITE_API_BASE_URL=
    volumes:
      - ./backend/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - sof-frontend-net

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: sof-nginx
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - sof-frontend-net
      - sof-backend-net

volumes:
  sof-postgres_data:
  sof-backend_uploads:

networks:
  sof-backend-net:
    driver: bridge
  sof-frontend-net:
    driver: bridge
