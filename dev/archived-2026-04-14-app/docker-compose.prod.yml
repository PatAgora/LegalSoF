# Production compose file.
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Differences from the dev compose:
#   - ENVIRONMENT=production (API docs off, strict CSP, SECRET_KEY enforced)
#   - No source bind-mounts and no dev servers — the backend image bundles
#     the built frontend and runs under gunicorn (see backend/Dockerfile)
#   - Postgres is NOT exposed on the host at all
#   - SECRET_KEY and ADMIN_PASSWORD are REQUIRED via :? expansion
services:
  postgres:
    image: postgres:16-alpine
    container_name: sof-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sof_platform}
    volumes:
      - sof-postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sof-backend-net-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sof-backend-prod
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:?err}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-sof_platform}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - CORS_ORIGINS=${CORS_ORIGINS:-[]}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - sof-backend_uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - sof-backend-net-prod
      - sof-frontend-net-prod

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: sof-nginx-prod
    volumes:
      # Production config — no dev frontend upstream; SPA is served by
      # the backend image.
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - sof-frontend-net-prod
      - sof-backend-net-prod

volumes:
  sof-postgres_data_prod:
  sof-backend_uploads_prod:

networks:
  sof-backend-net-prod:
    driver: bridge
  sof-frontend-net-prod:
    driver: bridge
