<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <rect width="360" height="80" rx="4" fill="transparent"/>

  <!-- Abstract Neural Head Profile - Orange -->
  <g transform="translate(8, 8)">
    <!-- Head silhouette outline -->
    <path d="M32 4 C20 4, 8 16, 8 30 C8 40, 12 48, 18 54 L18 60 C18 62, 20 64, 22 64 L38 64 C40 64, 42 62, 42 60 L42 52 C50 46, 56 38, 56 28 C56 14, 46 4, 32 4 Z"
          fill="none" stroke="#E8922D" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Neural network nodes -->
    <circle cx="28" cy="20" r="3" fill="#E8922D"/>
    <circle cx="40" cy="18" r="2.5" fill="#E8922D"/>
    <circle cx="22" cy="32" r="2.5" fill="#E8922D"/>
    <circle cx="34" cy="30" r="3" fill="#E8922D"/>
    <circle cx="44" cy="32" r="2" fill="#E8922D"/>
    <circle cx="28" cy="44" r="2.5" fill="#E8922D"/>
    <circle cx="38" cy="44" r="2" fill="#E8922D"/>
    <circle cx="18" cy="22" r="2" fill="#E8922D"/>
    <circle cx="46" cy="24" r="1.8" fill="#E8922D"/>
    <circle cx="32" cy="52" r="2" fill="#E8922D"/>

    <!-- Neural connections -->
    <line x1="28" y1="20" x2="40" y2="18" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="28" y1="20" x2="22" y2="32" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="28" y1="20" x2="34" y2="30" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="18" x2="34" y2="30" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="18" x2="44" y2="32" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="22" y1="32" x2="34" y2="30" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="34" y1="30" x2="44" y2="32" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="22" y1="32" x2="28" y2="44" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="34" y1="30" x2="28" y2="44" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="34" y1="30" x2="38" y2="44" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="44" y1="32" x2="38" y2="44" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="22" x2="28" y2="20" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="22" x2="22" y2="32" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="46" y1="24" x2="40" y2="18" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="46" y1="24" x2="44" y2="32" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="28" y1="44" x2="32" y2="52" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
    <line x1="38" y1="44" x2="32" y2="52" stroke="#E8922D" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- AGORA text - Bold -->
  <text x="78" y="38" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="white" letter-spacing="2">AGORA</text>

  <!-- CONSULTING text - Lighter weight -->
  <text x="78" y="58" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="white" letter-spacing="4" opacity="0.85">CONSULTING</text>
</svg>
